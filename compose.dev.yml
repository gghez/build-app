services:
  postgres:
    image: postgres:17-alpine
    container_name: buildapp-pg
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buildapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buildapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
